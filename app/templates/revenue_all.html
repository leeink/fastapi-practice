{% extends "base.html" %}

{% block title %}홈 - {{ site_name }}{% endblock %}

{% block content %}

    <div>
        <form class="search-selection" action="{{ url_for('search_revenue') }}">
            <select name="filter" id="filter">
                <option value="" selected disabled hidden {% if not selected_filter %}selected{% endif %}>필터 조건 선택</option>
                <option value="product_line" {% if selected_filter == 'product_line' %}selected{% endif %}>제품군</option>
                <option value="region" {% if selected_filter == 'region' %}selected{% endif %}>지역</option>
            </select>
        </form>
        <div>
            <canvas id="revenueChart" width="800" height="400"></canvas>
        </div>
        <div>
            <canvas id="marketingChart" width="800" height="400"></canvas>
        </div>
        <div>
            <canvas id="soldUnitsChart" width="800" height="400"></canvas>
        </div>
    </div>
    <script>
        document.getElementById('filter').addEventListener('change', function() {
            // 셀렉트 박스 값이 바뀌면 부모 폼을 찾아서 전송함
            this.form.submit();
        });
    </script>
    <script>
        const raw = [
            {% for row in data %}
            {
                year: "{{ row.year }}",
                label: "{{ row.label }}",
                revenue: {{ row.revenue|default(0) }},
                spend: {{ row.spend|default(0) }},
                units: {{ row.units|default(0) }}
            }{% if not loop.last %},{% endif %}
            {% endfor %}
        ];

        const years = [...new Set(raw.map(d => d.year))].sort();
        const labels = [...new Set(raw.map(d => d.label))];
        const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'];

        // --- 스타일링 ---
        const tension = 0;              // 곡선 완만함
        const legendPos = 'top';        // 범례 위치
        const borderWidth = 4;           // 선의 굵기 (숫자가 클수록 굵어짐, 기본값은 보통 3)
        const pointRadius = 5;           // 데이터 지점의 점 크기
        const pointBorderWidth = 2;      // 점 테두리 두께
        const pointHoverRadius = 8;      // 마우스를 올렸을 때 점의 크기
        // -------------------------

        const revenueDatasets = labels.map((label, index) => {
            return {
                label: label,
                data: years.map((year) => {
                    const found = raw.find(d => d.year === year && d.label === label);
                    return found ? found.revenue : 0;
                }),
                borderColor: colors[index % colors.length],
                fill: false,
                tension: tension,
                borderWidth: borderWidth,
                pointRadius: pointRadius,
                pointBorderWidth: pointBorderWidth,
                pointHoverRadius: pointHoverRadius,
                pointBackgroundColor : colors[index % colors.length],
            }
        })
        const spendDatasets = labels.map((label, index) => {
            return {
                label: label,
                data: years.map((year) => {
                    const found = raw.find(d => d.year === year && d.label === label);
                    return found ? found.spend : 0;
                }),
                borderColor: colors[index % colors.length],
                fill: false,
                tension: tension,
                borderWidth: borderWidth,
                pointRadius: pointRadius,
                pointBorderWidth: pointBorderWidth,
                pointHoverRadius: pointHoverRadius,
                pointBackgroundColor : colors[index % colors.length],

            }
        })
        const unitsDatasets = labels.map((label, index) => {
            return {
                label: label,
                data: years.map((year) => {
                    const found = raw.find(d => d.year === year && d.label === label);
                    return found ? found.units : 0;
                }),
                borderColor: colors[index % colors.length],
                fill: false,
                tension: tension,
                borderWidth: borderWidth,
                pointRadius: pointRadius,
                pointBorderWidth: pointBorderWidth,
                pointHoverRadius: pointHoverRadius,
                pointBackgroundColor : colors[index % colors.length],
            }
        })

        const revenueCtx = document.getElementById('revenueChart').getContext('2d');
        new Chart(revenueCtx, {
            type: 'line',
            data: {
                labels: years,
                datasets: revenueDatasets,
            },
            options: {
                responsive: true,
                interaction:{
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {position: legendPos},
                    title: {
                        display: true,
                        text: '연도별 매출액'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return value.toLocaleString() + '원';
                            }
                        }
                    }
                }
            }
        });

        const marketingCtx = document.getElementById('marketingChart').getContext('2d');
        new Chart(marketingCtx, {
            type: 'line',
            data: {
                labels: years,
                datasets: spendDatasets,
            },
            options: {
                responsive: true,
                interaction:{
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {position: legendPos},
                    title: {
                        display: true,
                        text: '연도별 마케팅 비용'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return value.toLocaleString() + '원';
                            }
                        }
                    }
                }
            }
        });

        const soldUnitsCtx = document.getElementById('soldUnitsChart').getContext('2d');
        new Chart(soldUnitsCtx, {
            type: 'line',
            data: {
                labels: years,
                datasets: unitsDatasets
            },
            options: {
                responsive: true,
                interaction:{
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {position: legendPos},
                    title: {
                        display: true,
                        text: '연도별 판매량'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return value.toLocaleString() + '개';
                            }
                        }
                    }
                }
            }
        });
    </script>
{% endblock %}
